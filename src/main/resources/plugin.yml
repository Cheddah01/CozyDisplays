name: CozyDisplays
version: '${project.version}'
main: gg.cozycrafters.cozydisplays.CozyDisplaysPlugin
api-version: '1.21'
author: Cozy Crafters
description: Lightweight fixed-direction vanilla text_display hologram plugin.
softdepend: [PlaceholderAPI]

commands:
  display:
    description: Manage CozyDisplays text holograms.
    usage: /display <create|addline|insertline|setline|removeline|movehere|nearby|clone|audit|edit|rotate|rotateby|face|spin|snapwall|nudge|up|down|left|right|forward|back|scale|viewrange|viewrangeall|enabled|hide|show|info|stats|setitem|setblock|interaction|rendermode|background|bgcolor|bgopacity|align|linespacing|shadow|seethrough|billboard|refresh|template|delete|list|reload>
    aliases: [cozydisplay, cozydisplays]
    permission: cozydisplays.admin
    permission-message: You need the cozydisplays.admin permission to use this.

permissions:
  cozydisplays.admin:
    description: Allows managing CozyDisplays holograms.
    default: op
