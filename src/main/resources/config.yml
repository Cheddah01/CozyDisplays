  title: "&8CozyDisplays &7- &f%id%"
  nudge-step: 0.1
  scale-step: 0.1
  view-range-step: 4
  opacity-step: 5
  line-spacing-step: 0.05
  rotation-step-yaw: 15.0
  rotation-step-pitch: 15.0
