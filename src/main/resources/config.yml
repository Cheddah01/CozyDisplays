# CozyDisplays configuration

# Per-display PlaceholderAPI refresh defaults. Automatic refresh is disabled
# by default because frequent text respawns can cause client FPS drops near
# busy signage. Manual refresh still works through /display refresh <id> and
# the editor refresh button.
refresh:
  default-enabled: false
  minimum-interval-minutes: 1
  default-interval-minutes: 5
  default-only-when-viewed: true
  default-viewer-range: 32

# Defaults used when creating new text displays. Missing saved background keys
# also use these values, while explicit background: false stays transparent.
text-defaults:
  render-mode: LINE_ENTITIES
  background-enabled: true
  background-color: "#000000"
  background-opacity: 25
  alignment: CENTER
  line-spacing: 0.25

# Default and maximum radius for /display nearby.
nearby-default-radius: 25
nearby-max-radius: 100

# Optional clickable display actions. Existing displays are not clickable unless
# interaction.enabled is true in displays.yml or via /display interaction enable.
interaction:
  default-width: 1.0
  default-height: 1.0
  default-cooldown-seconds: 1
  max-width: 5.0
  max-height: 5.0
  max-cooldown-seconds: 60

# Optional auto-rotation/spin controls. Existing displays do not spin unless
# rotation.auto.enabled is true in displays.yml or /display spin is used.
rotation:
  auto-update-ticks: 2
  max-degrees-per-second: 180.0

# Distance the display is pushed out from a wall face by /display snapwall.
# Too low z-fights with the block; too high floats off the wall.
wall-offset: 0.03

# Default render/view range for new displays and any display missing a
# per-display view-range in displays.yml. Lower values reduce client render
# load from dense signage. Falls back to 12.0 if invalid.
default-view-range: 12.0

# If more than this many TextDisplay entities are spawned, a render-lag
# warning is shown on startup and after /display reload. Falls back to 50.
display-entity-warning-threshold: 50

# Default move step (blocks) for /display nudge and the directional
# shortcuts when no amount is given. Falls back to 0.05 if invalid.
default-nudge-amount: 0.05

# When true, logs every spawned TextDisplay line with its display id, line
# index, UUID, configured block view range, and the applied Bukkit
# view-range multiplier. Leave false in production.
debug-view-range: false

# When true, logs a line on every placeholder refresh tick (displays checked
# and how many were updated). Leave false in production.
debug-placeholder-refresh: false

# Basic admin editor GUI. Item names and lore support legacy & color codes.
