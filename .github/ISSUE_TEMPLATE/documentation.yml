name: Documentation issue
description: Report unclear, missing, or inaccurate CozyDisplays documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page-section
    attributes:
      label: Page/section affected
      placeholder: README Installation, README Commands, MODRINTH Known Limitations, etc.
    validations:
      required: true

  - type: textarea
    id: unclear
    attributes:
      label: What is unclear or missing?
      description: Describe the confusing, missing, or inaccurate documentation.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Suggest wording or details that would make the docs clearer.

  - type: textarea
    id: relevant-example
    attributes:
      label: Relevant command/config/example
      description: Include the relevant command, config key, or example if one applies.
      render: text
